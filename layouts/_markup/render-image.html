{{- $post := .Page -}}
{{- $src := .Destination -}}
{{- if not (urls.Parse $src).IsAbs -}}
  {{- $resource := $post.Resources.GetMatch $src -}}
  {{- if $resource -}}
    {{- $src = $resource.RelPermalink -}}
  {{- end -}}
{{- end -}}
<img src="{{ $src | safeURL }}" alt="{{ .Text }}" {{ with .Title }} title="{{ . }}" {{ end }} style="max-width: 100%; height: auto; display:block; margin: 0 auto; border: 1px solid var(--glass-border); border-radius: .5rem;" />
